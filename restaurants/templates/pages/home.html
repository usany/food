{% extends 'base.html' %}
{% load static i18n %}

{% block title %}{% trans "Welcome to 쿠키khukie쿠우키" %}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'home.css' %}">
{% endblock %}

{% block content %}
<div class="text-center py-10">
    <h1 id="welcome-text" class="welcome-heading">{% trans "환영합니다" %} {% trans "쿠우키입니다" %}</h1>
    <div class="restaurant-grid">
        {% for item in items %}
        <a href="{% url 'menu_list' bases item.path %}"
            class="restaurant-card">
            <i data-lucide="store" class="restaurant-card-icon"></i>
            <span class="restaurant-card-label">{% trans item.title %}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
