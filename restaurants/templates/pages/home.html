{% extends 'base.html' %}

{% block title %}Welcome{% endblock %}

{% block content %}
<div class="text-center py-10">
    <h1 id="welcome-text" class="text-4xl font-bold text-blue-700 mb-6">Welcome to restaurants</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6 max-w-2xl mx-auto">
        {% for item in items %}
        <a href="{% url 'menu_list' bases item.path %}"
            class="flex items-center justify-between px-4 py-3 bg-white dark:bg-slate-800 text-gray-800 dark:text-gray-100 text-sm font-medium rounded-lg shadow hover:shadow-md hover:bg-gray-50 dark:hover:bg-slate-700 transition border border-gray-100 dark:border-slate-700">
            <svg class="w-[25px] h-[25px] text-blue-600 dark:text-blue-400 flex-shrink-0" fill="none" stroke="currentColor"
                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                </path>
            </svg>
            <span class="text-right">{{ item.title }}</span>
        </a>
        {% endfor %}
    </div>
    <p class="mt-4 text-blue-400">This is the main page.</p>
</div>
{% endblock %}
