{% load static i18n pwa %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% trans "App" %}{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="{% static 'nav.css' %}">
    {% block extra_css %}{% endblock %}
    <script>
        const saved = localStorage.getItem('darkMode');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'true' || (saved === null && prefersDark)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    {% progressive_web_app_meta %}
</head>

<body>
    <main>
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
        <!-- Top Buttons Wrapper (Dark Mode + Language) -->
        <div class="top-buttons-row">
            <button class="nav-item" onclick="document.querySelector('.bottom-nav').classList.toggle('expanded')">
                <i data-lucide="chevron-down"></i>
            </button>
            <div>{% trans "설정" %}</div>
            <div class="nav-items-row">
                <!-- Campus Button (hidden by default, shown when expanded) -->
                <button class="nav-button" id="campus-toggle" onclick="toggleBases()" title="{% trans 'Switch campus' %}">
                    <div>{% trans "캠퍼스" %}: </div>
                    <span id="campus-icon">{% if bases == 'gl' %}global{% else %}seoul{% endif %}</span>
                </button>
                <!-- Language Button (hidden by default, shown when expanded) -->
                <button class="nav-button" id="language-toggle" onclick="toggleBase()" title="{% trans 'Switch language' %}">
                    <div>{% trans "언어" %}: </div>
                    <span id="language-icon">{% trans "language" %}</span>
                </button>
                <!-- Dark Mode Toggle (hidden by default, shown when expanded) -->
                <button class="nav-button" id="dark-mode-toggle" onclick="toggleDarkMode()" title="{% trans 'Toggle dark mode' %}">
                    <div>{% trans "테마" %}: </div>
                    <span id="theme-icon"><i data-lucide="moon"></i></span>
                </button>
            </div>
        </div>
        <button class="nav-item" id="nav-toggle" onclick="toggleNavExpanded()">
            <i data-lucide="chevron-up"></i>
        </button>
        <!-- Nav Items Wrapper -->
        <div class="nav-items-wrapper">
            <!-- Location 1: Home Link -->
            <a href="{% url 'home_menu' 'se' %}" class="nav-item" id="nav-home" title="{% trans 'Home' %}">
                <i data-lucide="home"></i>
                <span>seoul</span>
            </a>
            <!-- Location 2: Menus Link -->
            <a href="{% url 'home_menu' 'gl' %}" class="nav-item" id="nav-menus" title="{% trans 'Menus' %}">
                <i data-lucide="menu"></i>
                <span>global</span>
            </a>
        </div>
    </nav>
    <script>
        // localStorage utilities
        function setStorage(name, value) {
            localStorage.setItem(name, value);
        }

        function getStorage(name) {
            return localStorage.getItem(name);
        }

        // Toggle language between English and Korean (or other languages)
        function toggleBase() {
            const currentLang = getStorage('base') || 'ko';
            const newLang = currentLang === 'ko' ? 'en' : 'ko';
            setStorage('base', newLang);
            updateLanguageIcon(newLang);
            const path = window.location.pathname;
            const currentBase = path.slice(4, 6) === 'gl' ? 'gl' : 'se';
            const pathSegments = path.split('/').filter(Boolean);
            let newPath = `/${newLang}/${currentBase}/`;
            if (pathSegments.length > 2) {
                newPath += pathSegments.slice(2).join('/') + '/';
            }
            window.location.href = newPath;
        }

        function updateLanguageIcon(lang) {
            const languageIcon = document.getElementById('language-icon');
            if (lang === 'ko') {
                languageIcon.textContent = '한국어';
            } else {
                languageIcon.textContent = 'English';
            }
        }

        function updateCampusIcon(campus) {
            const campusIcon = document.getElementById('campus-icon');
            if (campus === 'se') {
                campusIcon.textContent = 'seoul';
            } else {
                campusIcon.textContent = 'global';
            }
        }

        function updateThemeIcon(isDark) {
            const themeIcon = document.getElementById('theme-icon');
            themeIcon.innerHTML = `<i data-lucide="${isDark ? 'moon' : 'sun'}"></i>`;
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        // Toggle base/campus between 'se' and 'gl'
        function toggleBases() {
            const currentBase = getStorage('bases') || 'se';
            const newBase = currentBase === 'se' ? 'gl' : 'se';
            setStorage('bases', newBase);
            updateCampusIcon(newBase);
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            setStorage('darkMode', isDark);
            updateThemeIcon(isDark);
        }
        function toggleNavExpanded() {
            const nav = document.querySelector('.bottom-nav');
            nav.classList.toggle('expanded');
            setStorage('navExpanded', nav.classList.contains('expanded'));
        }

        document.addEventListener('click', (e) => {
            const nav = document.querySelector('.bottom-nav');
            if (nav.classList.contains('expanded') && !nav.contains(e.target)) {
                // If target was detached from DOM (e.g. innerHTML replaced by icon swap),
                // treat it as inside-nav to avoid false close
                if (!document.body.contains(e.target)) return;
                nav.classList.remove('expanded');
                setStorage('navExpanded', 'false');
            }
        });


        // Simple script to set active state based on URL
        document.addEventListener('DOMContentLoaded', () => {
            const segments = window.location.pathname.split('/').filter(Boolean);
            const bases = segments.length >= 2 ? segments[1] : null;
            if (bases === 'se') {
                document.getElementById('nav-home').style.color = '#3b82f6';
            } else if (bases === 'gl') {
                document.getElementById('nav-menus').style.color = '#3b82f6';
            }

            // Restore nav expanded state
            if (getStorage('navExpanded') === 'true') {
                document.querySelector('.bottom-nav').classList.add('expanded');
            }

            // Initialize dark mode from localStorage
            const isDarkMode = getStorage('darkMode') === 'true';
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
            }
            updateThemeIcon(isDarkMode);

            // Initialize language icon based on localStorage
            const currentLang = getStorage('base') || 'ko';
            updateLanguageIcon(currentLang);

            // Initialize campus icon based on localStorage
            const currentBase = getStorage('bases') || 'se';
            updateCampusIcon(currentBase);
        });
    </script>
    <script src="https://unpkg.com/lucide@0.344.0"></script>
    <script>lucide.createIcons()</script>
</body>

</html>
