{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% trans "App" %}{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="{% static 'nav.css' %}">
    {% block extra_css %}{% endblock %}
    <script src="{% static 'theme.js' %}"></script>
</head>

<body class="m-0 p-0 font-['Inter',sans-serif] bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 pb-[90px] box-border">
    <main class="p-5 max-w-3xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav fixed bottom-6 left-1/2 -translate-x-1/2 w-max min-w-[200px] bg-white/90 dark:bg-slate-800/90 backdrop-blur-[15px] shadow-[0_10px_30px_rgba(0,0,0,0.1),0_1px_3px_rgba(0,0,0,0.05)] dark:shadow-[0_10px_30px_rgba(0,0,0,0.4),0_1px_3px_rgba(0,0,0,0.2)] flex px-[30px] py-3 rounded-lg border border-white/80 dark:border-white/10 z-[1000] flex-col">
        <!-- Top Buttons Wrapper (Dark Mode + Language) -->
        <div class="top-buttons-row hidden flex-col gap-5 justify-center">
            <button class="nav-item flex flex-col items-center no-underline text-slate-400 dark:text-slate-500 text-xs font-medium hover:text-blue-500 dark:hover:text-blue-400 hover:-translate-y-0.5 transition-all duration-300 bg-transparent border-none cursor-pointer" onclick="document.querySelector('.bottom-nav').classList.toggle('expanded')">
                <svg class="w-6 h-6 mb-1 fill-current" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 10l5 5 5-5z" />
                </svg>
            </button>
            <div class="text-center">메뉴 설정</div>
            <div class="nav-items-row flex flex-col gap-[30px] justify-around">
                <!-- Campus Button (hidden by default, shown when expanded) -->
                <button class="flex gap-5 cursor-pointer text-xl bg-transparent border-none text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 transition-colors duration-300 p-0" id="campus-toggle" onclick="toggleBases()" title="{% trans 'Switch campus' %}">
                    <div>캠퍼스: </div>
                    <span id="campus-icon">🏫 {% trans "campus" %}</span>
                </button>
                <!-- Language Button (hidden by default, shown when expanded) -->
                <button class="flex gap-5 cursor-pointer text-xl bg-transparent border-none text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 transition-colors duration-300 p-0" id="language-toggle" onclick="toggleBase()" title="{% trans 'Switch language' %}">
                    <div>언어: </div>
                    <span id="language-icon">🌐 {% trans "language" %}</span>
                </button>
                <!-- Dark Mode Toggle (hidden by default, shown when expanded) -->
                <button class="flex gap-5 cursor-pointer text-xl bg-transparent border-none text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 transition-colors duration-300 p-0" id="dark-mode-toggle" onclick="toggleDarkMode()" title="{% trans 'Toggle dark mode' %}">
                    <span id="theme-icon">🌙 {% trans "theme" %}</span>
                </button>
            </div>
        </div>
        <button class="nav-item flex flex-col items-center no-underline text-slate-400 dark:text-slate-500 text-xs font-medium hover:text-blue-500 dark:hover:text-blue-400 hover:-translate-y-0.5 transition-all duration-300 bg-transparent border-none cursor-pointer" id="nav-toggle" onclick="document.querySelector('.bottom-nav').classList.toggle('expanded')">
            <svg class="w-6 h-6 mb-1 fill-current" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 14l5-5 5 5z" />
            </svg>
        </button>
        <!-- Nav Items Wrapper -->
        <div class="flex gap-[30px] justify-around w-full">
            <!-- Location 1: Home Link -->
            <a href="{% url 'home_menu' 'se' %}" class="nav-item flex flex-col items-center no-underline text-slate-400 dark:text-slate-500 text-xs font-medium hover:text-blue-500 dark:hover:text-blue-400 hover:-translate-y-0.5 transition-all duration-300" id="nav-home" title="{% trans 'Home' %}">
                <svg class="w-6 h-6 mb-1 fill-current" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span>se</span>
            </a>
            <!-- Location 2: Menus Link -->
            <a href="{% url 'home_menu' 'gl' %}" class="nav-item flex flex-col items-center no-underline text-slate-400 dark:text-slate-500 text-xs font-medium hover:text-blue-500 dark:hover:text-blue-400 hover:-translate-y-0.5 transition-all duration-300" id="nav-menus" title="{% trans 'Menus' %}">
                <svg class="w-6 h-6 mb-1 fill-current" viewBox="0 0 24 24">
                    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
                </svg>
                <span>gl</span>
            </a>

            <!-- <button class="nav-item flex flex-col items-center no-underline text-slate-400 dark:text-slate-500 text-xs font-medium hover:text-blue-500 dark:hover:text-blue-400 hover:-translate-y-0.5 transition-all duration-300 bg-transparent border-none cursor-pointer" id="nav-toggle" onclick="document.querySelector('.bottom-nav').classList.toggle('expanded')">
                <svg class="w-6 h-6 mb-1 fill-current" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 14l5-5 5 5z" />
                </svg>
                <span>Menu</span>
            </button> -->
        </div>
    </nav>
    <script>
        // localStorage utilities
        function setStorage(name, value) {
            localStorage.setItem(name, value);
        }

        function getStorage(name) {
            return localStorage.getItem(name);
        }

        // Toggle language between English and Korean (or other languages)
        function toggleBase() {
            const currentLang = getStorage('base') || 'ko';
            const newLang = currentLang === 'ko' ? 'en' : 'ko';
            setStorage('base', newLang);
            updateLanguageIcon(newLang);
            const currentBase = getStorage('bases') || 'se';
            const path = window.location.pathname;
            const pathSegments = path.split('/').filter(Boolean);
            let newPath = `/${newLang}/${currentBase}/`;
            if (pathSegments.length > 2) {
                newPath += pathSegments.slice(2).join('/') + '/';
            }
            window.location.href = newPath;
        }

        function updateLanguageIcon(lang) {
            const languageIcon = document.getElementById('language-icon');
            if (lang === 'ko') {
                languageIcon.textContent = '🌐 KO';
            } else {
                languageIcon.textContent = '🌐 EN';
            }
        }

        function updateCampusIcon(campus) {
            const campusIcon = document.getElementById('campus-icon');
            if (campus === 'se') {
                campusIcon.textContent = '🏫 SE';
            } else {
                campusIcon.textContent = '🏫 GL';
            }
        }

        function updateThemeIcon(isDark) {
            const themeIcon = document.getElementById('theme-icon');
            themeIcon.textContent = isDark ? '☀️ {% trans "theme" %}' : '🌙 {% trans "theme" %}';
        }

        // Toggle base/campus between 'se' and 'gl'
        function toggleBases() {
            const currentBase = getStorage('bases') || 'se';
            const newBase = currentBase === 'se' ? 'gl' : 'se';
            setStorage('bases', newBase);
            updateCampusIcon(newBase);
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            setStorage('darkMode', isDark);
            updateThemeIcon(isDark);
        }

        // Simple script to set active state based on URL
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            if (currentPath === '/' || currentPath.includes('/se')) {
                document.getElementById('nav-home').style.color = '#3b82f6';
            } else if (currentPath.includes('/gl')) {
                document.getElementById('nav-menus').style.color = '#3b82f6';
            }

            // Initialize dark mode from localStorage
            const isDarkMode = getStorage('darkMode') === 'true';
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
            }
            updateThemeIcon(isDarkMode);

            // Initialize language icon based on localStorage
            const currentLang = getStorage('base') || 'ko';
            updateLanguageIcon(currentLang);

            // Initialize campus icon based on localStorage
            const currentBase = getStorage('bases') || 'se';
            updateCampusIcon(currentBase);
        });
    </script>
</body>

</html>
