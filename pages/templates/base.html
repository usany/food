{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --nav-active: #3b82f6;
            --nav-inactive: #94a3b8;
            --border-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 90px;
            /* Space for fixed bottom nav */
            box-sizing: border-box;
        }

        /* Container for the main content */
        main {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Dock Style Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            min-width: 200px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            gap: 30px;
            padding: 12px 30px;
            border-radius: 9999px;
            /* Fully rounded corners */
            border: 1px solid rgba(255, 255, 255, 0.8);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--nav-inactive);
            font-size: 0.75rem;
            font-weight: 500;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .nav-item:hover {
            color: var(--nav-active);
            transform: translateY(-2px);
        }

        /* Simple placeholder icons using CSS circles/shapes or SVG */
        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            fill: currentColor;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <main>
        {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
        <!-- Location 1: Home Link -->
        <a href="{% url 'home' %}" class="nav-item" id="nav-home">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            <span>se</span>
        </a>
        <!-- Location 2: Menus Link -->
        <a href="{% url 'menu_list' %}" class="nav-item" id="nav-menus">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
            <span>gl</span>
        </a>
    </nav>
    <script>
        // Simple script to set active state based on URL
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            if (currentPath === '/' || currentPath === '/home/') {
                document.getElementById('nav-home').style.color = 'var(--nav-active)';
            } else if (currentPath.startsWith('/pages/')) {
                document.getElementById('nav-menus').style.color = 'var(--nav-active)';
            }
        });
    </script>
</body>

</html>
