services:
  web:
    build: .
    container_name: food
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Seoul
      - DJANGO_DEBUG=False
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  scheduler:
    build: .
    container_name: food-scheduler
    command: python manage.py run_scheduler
    environment:
      - TZ=Asia/Seoul
      - DJANGO_DEBUG=False
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
